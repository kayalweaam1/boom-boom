<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Boom Boom - Screenshots</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root {
      --bg: #050818;
      --card: #111727;
      --accent: #f5c542;
      --accent-soft: #ffe89b;
      --text: #ffffff;
      --text-muted: #b6bed3;
    }
    * { box-sizing:border-box; margin:0; padding:0; font-family:system-ui, -apple-system, BlinkMacSystemFont,"Segoe UI",sans-serif; }
    body {
      background: radial-gradient(circle at top, #1b2445 0, #050818 55%);
      color: var(--text);
      min-height: 100vh;
      display:flex;
      flex-direction:column;
    }
    header {
      background: linear-gradient(to right, #050818, #0e1328);
      border-bottom: 1px solid rgba(245,197,66,0.35);
      box-shadow: 0 6px 20px rgba(0,0,0,0.6);
      position: sticky;
      top: 0;
      z-index: 40;
    }
    .header-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:18px;
    }
    .logo-wrap { display:flex; align-items:center; gap:10px; }
    .logo-icon {
      width: 36px; height:36px; border-radius:12px;
      background: radial-gradient(circle at 30% 0, #fff7d0, #f5c542 45%, #8a5a11 100%);
      display:flex; align-items:center; justify-content:center;
      font-weight:900; font-size:20px; color:#251100;
      box-shadow:0 0 18px rgba(245,197,66,0.7);
    }
    .logo-text-main { font-size:18px; font-weight:800; letter-spacing:0.05em; }
    .logo-text-sub { font-size:11px; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; }
    nav { display:flex; gap:16px; font-size:14px; }
    nav a { color:var(--text-muted); text-decoration:none; }
    nav a:hover { color:var(--accent-soft); text-decoration:none; }

    main {
      flex:1;
      max-width:1100px;
      margin:0 auto;
      padding:26px 16px 40px;
    }
    h1 {
      font-size:26px;
      margin-bottom:6px;
    }
    p.subtitle {
      color:var(--text-muted);
      font-size:14px;
      margin-bottom:18px;
    }
    .grid {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));
      gap:16px;
    }
    .shot {
      background: radial-gradient(circle at top, rgba(245,197,66,0.12), rgba(5,8,24,0.95));
      border-radius:18px;
      border:1px solid rgba(144,160,210,0.55);
      overflow:hidden;
      box-shadow:0 16px 40px rgba(0,0,0,0.8);
    }
    .shot img {
      width:100%;
      display:block;
    }
    .shot-label {
      padding:8px 10px;
      font-size:13px;
      color:var(--accent-soft);
      border-top:1px solid rgba(144,160,210,0.4);
      background:rgba(5,8,24,0.98);
      text-align:center;
    }
    footer {
      border-top: 1px solid rgba(144,160,210,0.35);
      background: radial-gradient(circle at top, rgba(245,197,66,0.16), #050818 65%);
      text-align:center;
      padding: 16px 10px 20px;
      font-size: 12px;
      color: var(--text-muted);
    }
    @media (max-width: 840px) {
      .header-inner { flex-direction:column; align-items:flex-start; }
      nav { flex-wrap:wrap; }
    }
  </style>
</head>
<body>
<header>
  <div class="header-inner">
    <div class="logo-wrap">
      <div class="logo-icon">B</div>
      <div>
        <div class="logo-text-main">Boom Boom</div>
        <div class="logo-text-sub">EXA GAMING · OFFICIAL SITE</div>
      </div>
    </div>
    <nav>
      <a href="index.html">Home</a>
      <a href="screenshots.html">Screenshots</a>
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </nav>
  </div>
</header>

<main>
  <h1>Screenshots</h1>
  <p class="subtitle">A quick look at the main screens and gameplay of Boom Boom.</p>

  <div class="grid">
    <div class="shot">
      <img src="shot_home.png" alt="Boom Boom - Home Screen">
      <div class="shot-label">Home Screen</div>
    </div>
    <div class="shot">
      <img src="shot_gameplay.png" alt="Boom Boom - Gameplay">
      <div class="shot-label">Classic Mode Gameplay</div>
    </div>
    <div class="shot">
      <img src="shot_explosion.png" alt="Boom Boom - Bomb Effects">
      <div class="shot-label">Bomb & Explosion Effects</div>
    </div>
    <div class="shot">
      <img src="shot_rewards.png" alt="Boom Boom - Rewards">
      <div class="shot-label">Hearts, Coins & Rewards</div>
    </div>
  </div>
</main>

<footer>
  © 2025 Boom Boom · Exa Gaming. All rights reserved.
</footer>
</body>
</html>
